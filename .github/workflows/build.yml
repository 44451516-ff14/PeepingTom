name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /home/runner/dalamud
      PLUGIN_BUILD_DIR: /tmp/plugin-build
      PROJECT_FILE: Peeping Tom/Peeping Tom.csproj
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read release metadata
        id: metadata
        shell: python
        run: |
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse(os.environ["PROJECT_FILE"]).getroot()

          def read_property(name):
              for element in root.iter():
                  if element.tag.split("}")[-1] == name and element.text:
                      return element.text.strip()
              return None

          version = read_property("Version") or read_property("AssemblyVersion")
          if not version:
              raise SystemExit(f"{os.environ['PROJECT_FILE']} does not define Version or AssemblyVersion")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud Latest
        run: |
          wget https://goatcorp.github.io/dalamud-distrib/latest.zip -O "${DALAMUD_HOME}.zip"
          unzip "${DALAMUD_HOME}.zip" -d "${DALAMUD_HOME}"

      - name: Restore Project
        run: dotnet restore "${PROJECT_FILE}" -p:IsCI=true

      - name: Build Project
        run: |
          dotnet build --no-restore --configuration Release "${PROJECT_FILE}" --output "${PLUGIN_BUILD_DIR}" -p:IsCI=true
          zip_path="$(find "${PLUGIN_BUILD_DIR}" -name '*.zip' -print -quit)"
          if [ -z "${zip_path}" ]; then
            echo "No plugin zip was produced by the build" >&2
            exit 1
          fi
          cp "${zip_path}" "PeepingTom-${{ steps.metadata.outputs.version }}.zip"
          unzip -l "PeepingTom-${{ steps.metadata.outputs.version }}.zip"

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: PeepingTom-${{ steps.metadata.outputs.version }}-${{ github.run_number }}-${{ github.sha }}
          path: PeepingTom-${{ steps.metadata.outputs.version }}.zip
          if-no-files-found: error

      - name: Publish Version Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.metadata.outputs.version }}
          tag_name: ${{ steps.metadata.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: PeepingTom-${{ steps.metadata.outputs.version }}.zip
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Trigger DalamudPlugins
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.DALAMUD_PLUGINS_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/44451516-ff14/DalamudPlugins/actions/workflows/main.yml/dispatches \
            -d '{"ref":"master"}'
